  <style>
    /* 1. Nền & Cấu trúc cơ bản */
    body, html { 
      height: 100%; margin: 0; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                  url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1600'); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: white;
      overflow-x: hidden;
    }

    .navbar { background-color: rgba(0,0,0,0.9); border: none; z-index: 1000; }

    /* 2. Cấu trúc hiển thị nội dung cố định */
    .content-section { 
      width: 100%;
      padding-top: 120px;
      padding-bottom: 50px;
    }

    /* 3. Thẻ Glassmorphism */
    .info-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: 0.3s;
    }
    .info-card:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-5px);
    }
    
    .btn-view { 
      background: #337ab7; color: white; border: none; 
      padding: 8px 25px; border-radius: 20px; font-weight: bold;
      text-decoration: none; display: inline-block; transition: 0.3s;
    }
    .btn-view:hover { background: #5dade2; transform: scale(1.1); color: white; text-decoration: none; }

    /* Layout danh sách bài tập */
    .exercise-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
